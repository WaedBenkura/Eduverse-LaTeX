<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1320" viewBox="0 0 1200 1320">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#374151"/>
    </marker>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .body { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .small { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .action { fill: #f8fafc; stroke: #1f2937; stroke-width: 2.2; }
      .decision { fill: #ffffff; stroke: #1f2937; stroke-width: 2.2; }
      .flow { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="1320" fill="#ffffff"/>
  <text x="600" y="54" text-anchor="middle" class="title">Activity Diagram: Teacher Starts a Live Session</text>

  <circle cx="600" cy="96" r="18" fill="#111827"/>
  <line x1="600" y1="114" x2="600" y2="158" class="flow"/>

  <rect x="420" y="158" width="360" height="76" rx="18" ry="18" class="action"/>
  <text x="600" y="202" text-anchor="middle" class="body">Enter Class Workspace as Teacher</text>

  <line x1="600" y1="234" x2="600" y2="286" class="flow"/>
  <rect x="425" y="286" width="350" height="76" rx="18" ry="18" class="action"/>
  <text x="600" y="330" text-anchor="middle" class="body">Open Live Session Management</text>

  <line x1="600" y1="362" x2="600" y2="412" class="flow"/>
  <rect x="395" y="412" width="410" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="450" text-anchor="middle" class="body">System Verifies Teacher Permission,</text>
  <text x="600" y="474" text-anchor="middle" class="body">Class Feature State, and Session Rules</text>

  <line x1="600" y1="494" x2="600" y2="548" class="flow"/>
  <polygon points="600,548 725,635 600,722 475,635" class="decision"/>
  <text x="600" y="629" text-anchor="middle" class="body">Session start</text>
  <text x="600" y="654" text-anchor="middle" class="body">allowed?</text>

  <line x1="475" y1="635" x2="270" y2="635" class="flow"/>
  <rect x="85" y="595" width="185" height="82" rx="18" ry="18" class="action"/>
  <text x="177" y="633" text-anchor="middle" class="small">Show Restriction</text>
  <text x="177" y="657" text-anchor="middle" class="small">Message</text>

  <line x1="600" y1="722" x2="600" y2="782" class="flow"/>
  <rect x="395" y="782" width="410" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="820" text-anchor="middle" class="body">Create LiveKit Room and Publish</text>
  <text x="600" y="844" text-anchor="middle" class="body">Session Metadata to the Class</text>

  <line x1="600" y1="864" x2="600" y2="914" class="flow"/>
  <rect x="420" y="914" width="360" height="76" rx="18" ry="18" class="action"/>
  <text x="600" y="958" text-anchor="middle" class="body">Teacher Conducts Live Session</text>

  <line x1="600" y1="990" x2="600" y2="1044" class="flow"/>
  <rect x="420" y="1044" width="360" height="76" rx="18" ry="18" class="action"/>
  <text x="600" y="1088" text-anchor="middle" class="body">End Session and Close Room</text>

  <line x1="600" y1="1120" x2="600" y2="1170" class="flow"/>
  <rect x="395" y="1170" width="410" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="1208" text-anchor="middle" class="body">Store Session State and Notify</text>
  <text x="600" y="1232" text-anchor="middle" class="body">Participants of Session Completion</text>

  <line x1="600" y1="1252" x2="600" y2="1298" class="flow"/>
  <circle cx="600" cy="1298" r="22" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <circle cx="600" cy="1298" r="12" fill="#111827"/>
</svg>
