<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1280" viewBox="0 0 1200 1280">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#374151"/>
    </marker>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .body { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .small { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .action { fill: #f8fafc; stroke: #1f2937; stroke-width: 2.2; }
      .decision { fill: #ffffff; stroke: #1f2937; stroke-width: 2.2; }
      .flow { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="1280" fill="#ffffff"/>
  <text x="600" y="54" text-anchor="middle" class="title">Activity Diagram: AI Agent Interaction</text>

  <circle cx="600" cy="96" r="18" fill="#111827"/>
  <line x1="600" y1="114" x2="600" y2="158" class="flow"/>

  <rect x="415" y="158" width="370" height="76" rx="18" ry="18" class="action"/>
  <text x="600" y="202" text-anchor="middle" class="body">Open a Class or Learning Context</text>

  <line x1="600" y1="234" x2="600" y2="286" class="flow"/>
  <rect x="430" y="286" width="340" height="76" rx="18" ry="18" class="action"/>
  <text x="600" y="330" text-anchor="middle" class="body">Launch Eduverse AI Agent</text>

  <line x1="600" y1="362" x2="600" y2="414" class="flow"/>
  <rect x="385" y="414" width="430" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="452" text-anchor="middle" class="body">System Sends Role, Class Context, and</text>
  <text x="600" y="476" text-anchor="middle" class="body">Relevant Learning References to Service</text>

  <line x1="600" y1="496" x2="600" y2="550" class="flow"/>
  <rect x="390" y="550" width="420" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="588" text-anchor="middle" class="body">User Requests Explanation, Summary,</text>
  <text x="600" y="612" text-anchor="middle" class="body">or Assignment-Related Guidance</text>

  <line x1="600" y1="632" x2="600" y2="684" class="flow"/>
  <rect x="395" y="684" width="410" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="722" text-anchor="middle" class="body">AI Agent Generates Contextual Response</text>
  <text x="600" y="746" text-anchor="middle" class="body">Within the Approved Learning Scope</text>

  <line x1="600" y1="766" x2="600" y2="820" class="flow"/>
  <polygon points="600,820 725,905 600,990 475,905" class="decision"/>
  <text x="600" y="899" text-anchor="middle" class="body">Follow-up or</text>
  <text x="600" y="924" text-anchor="middle" class="body">clarification needed?</text>

  <line x1="475" y1="905" x2="350" y2="905" class="flow"/>
  <line x1="350" y1="905" x2="350" y2="590" class="flow"/>
  <line x1="350" y1="590" x2="390" y2="590" class="flow"/>
  <text x="325" y="750" text-anchor="middle" class="small">iterate</text>

  <line x1="600" y1="990" x2="600" y2="1048" class="flow"/>
  <rect x="390" y="1048" width="420" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="1086" text-anchor="middle" class="body">User Applies the Response as Support,</text>
  <text x="600" y="1110" text-anchor="middle" class="body">While Teacher Judgment Remains Decisive</text>

  <line x1="600" y1="1130" x2="600" y2="1178" class="flow"/>
  <circle cx="600" cy="1178" r="22" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <circle cx="600" cy="1178" r="12" fill="#111827"/>
</svg>
