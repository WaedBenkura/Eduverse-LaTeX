<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1460" viewBox="0 0 1200 1460">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#374151"/>
    </marker>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .body { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .small { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .action { fill: #f8fafc; stroke: #1f2937; stroke-width: 2.2; }
      .decision { fill: #ffffff; stroke: #1f2937; stroke-width: 2.2; }
      .flow { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="1460" fill="#ffffff"/>
  <text x="600" y="54" text-anchor="middle" class="title">Activity Diagram: Student Exam Participation</text>

  <circle cx="600" cy="96" r="18" fill="#111827"/>
  <line x1="600" y1="114" x2="600" y2="158" class="flow"/>

  <rect x="430" y="158" width="340" height="76" rx="18" ry="18" class="action"/>
  <text x="600" y="202" text-anchor="middle" class="body">Open Class and Select Exam</text>

  <line x1="600" y1="234" x2="600" y2="286" class="flow"/>
  <rect x="400" y="286" width="400" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="324" text-anchor="middle" class="body">System Checks Enrollment, Timing,</text>
  <text x="600" y="348" text-anchor="middle" class="body">Attempt Status, and Permissions</text>

  <line x1="600" y1="368" x2="600" y2="422" class="flow"/>
  <polygon points="600,422 725,507 600,592 475,507" class="decision"/>
  <text x="600" y="501" text-anchor="middle" class="body">Exam access</text>
  <text x="600" y="526" text-anchor="middle" class="body">allowed?</text>

  <line x1="475" y1="507" x2="270" y2="507" class="flow"/>
  <rect x="85" y="467" width="185" height="82" rx="18" ry="18" class="action"/>
  <text x="177" y="505" text-anchor="middle" class="small">Show Unavailable</text>
  <text x="177" y="529" text-anchor="middle" class="small">or Locked State</text>

  <line x1="600" y1="592" x2="600" y2="650" class="flow"/>
  <rect x="420" y="650" width="360" height="76" rx="18" ry="18" class="action"/>
  <text x="600" y="694" text-anchor="middle" class="body">Start Timed Exam Attempt</text>

  <line x1="600" y1="726" x2="600" y2="778" class="flow"/>
  <rect x="390" y="778" width="420" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="816" text-anchor="middle" class="body">Answer Questions While Integrity and</text>
  <text x="600" y="840" text-anchor="middle" class="body">Navigation Rules Remain Enforced</text>

  <line x1="600" y1="860" x2="600" y2="914" class="flow"/>
  <polygon points="600,914 725,999 600,1084 475,999" class="decision"/>
  <text x="600" y="993" text-anchor="middle" class="body">Time ended or</text>
  <text x="600" y="1018" text-anchor="middle" class="body">student submits?</text>

  <line x1="475" y1="999" x2="350" y2="999" class="flow"/>
  <line x1="350" y1="999" x2="350" y2="819" class="flow"/>
  <line x1="350" y1="819" x2="390" y2="819" class="flow"/>
  <text x="328" y="908" text-anchor="middle" class="small">continue</text>

  <line x1="600" y1="1084" x2="600" y2="1140" class="flow"/>
  <rect x="405" y="1140" width="390" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="1178" text-anchor="middle" class="body">Store Answers, Close Attempt, and</text>
  <text x="600" y="1202" text-anchor="middle" class="body">Register Submission Outcome</text>

  <line x1="600" y1="1222" x2="600" y2="1278" class="flow"/>
  <rect x="415" y="1278" width="370" height="76" rx="18" ry="18" class="action"/>
  <text x="600" y="1322" text-anchor="middle" class="body">Display Completion Confirmation</text>

  <line x1="600" y1="1354" x2="600" y2="1402" class="flow"/>
  <circle cx="600" cy="1402" r="22" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <circle cx="600" cy="1402" r="12" fill="#111827"/>
</svg>
