<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1650" viewBox="0 0 1200 1650">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#374151"/>
    </marker>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .body { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .small { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .action { fill: #f8fafc; stroke: #1f2937; stroke-width: 2.2; rx: 18; ry: 18; }
      .decision { fill: #ffffff; stroke: #1f2937; stroke-width: 2.2; }
      .flow { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="1500" fill="#ffffff"/>
  <text x="600" y="54" text-anchor="middle" class="title">Activity Diagram: Authentication and Role Selection</text>

  <circle cx="600" cy="98" r="18" fill="#111827"/>
  <line x1="600" y1="116" x2="600" y2="155" class="flow"/>

  <rect x="420" y="155" width="360" height="72" rx="18" ry="18" class="action"/>
  <text x="600" y="199" text-anchor="middle" class="body">Open Eduverse Sign-In Interface</text>

  <line x1="600" y1="227" x2="600" y2="278" class="flow"/>
  <rect x="410" y="278" width="380" height="78" rx="18" ry="18" class="action"/>
  <text x="600" y="322" text-anchor="middle" class="body">Enter Credentials and Submit Request</text>

  <line x1="600" y1="356" x2="600" y2="408" class="flow"/>
  <rect x="400" y="408" width="400" height="78" rx="18" ry="18" class="action"/>
  <text x="600" y="452" text-anchor="middle" class="body">Validate Credentials and Load Identity</text>

  <line x1="600" y1="486" x2="600" y2="530" class="flow"/>
  <polygon points="600,530 725,620 600,710 475,620" class="decision"/>
  <text x="600" y="615" text-anchor="middle" class="body">Credentials</text>
  <text x="600" y="640" text-anchor="middle" class="body">valid?</text>

  <line x1="475" y1="620" x2="265" y2="620" class="flow"/>
  <rect x="80" y="580" width="185" height="82" rx="18" ry="18" class="action"/>
  <text x="172" y="618" text-anchor="middle" class="small">Show Error and</text>
  <text x="172" y="642" text-anchor="middle" class="small">Request Re-entry</text>
  <line x1="172" y1="580" x2="172" y2="317" class="flow"/>
  <line x1="172" y1="317" x2="410" y2="317" class="flow"/>
  <text x="355" y="305" text-anchor="middle" class="small">retry</text>

  <line x1="600" y1="710" x2="600" y2="770" class="flow"/>
  <rect x="385" y="770" width="430" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="808" text-anchor="middle" class="body">Load Available Organizations and Roles</text>

  <line x1="600" y1="852" x2="600" y2="896" class="flow"/>
  <polygon points="600,896 735,986 600,1076 465,986" class="decision"/>
  <text x="600" y="981" text-anchor="middle" class="body">More than one</text>
  <text x="600" y="1006" text-anchor="middle" class="body">organization?</text>

  <line x1="735" y1="986" x2="935" y2="986" class="flow"/>
  <rect x="935" y="945" width="185" height="82" rx="18" ry="18" class="action"/>
  <text x="1027" y="983" text-anchor="middle" class="small">Select Active</text>
  <text x="1027" y="1007" text-anchor="middle" class="small">Organization</text>
  <line x1="1027" y1="1027" x2="1027" y2="1125" class="flow"/>
  <line x1="1027" y1="1125" x2="600" y2="1125" class="flow"/>

  <line x1="600" y1="1076" x2="600" y2="1125" class="flow"/>
  <rect x="390" y="1125" width="420" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="1163" text-anchor="middle" class="body">Resolve Active Role for Selected Context</text>

  <line x1="600" y1="1207" x2="600" y2="1250" class="flow"/>
  <polygon points="600,1250 720,1330 600,1410 480,1330" class="decision"/>
  <text x="600" y="1324" text-anchor="middle" class="body">Role choice</text>
  <text x="600" y="1349" text-anchor="middle" class="body">needed?</text>

  <line x1="720" y1="1330" x2="905" y2="1330" class="flow"/>
  <rect x="905" y="1289" width="180" height="82" rx="18" ry="18" class="action"/>
  <text x="995" y="1327" text-anchor="middle" class="small">Choose Active</text>
  <text x="995" y="1351" text-anchor="middle" class="small">Role</text>
  <line x1="995" y1="1371" x2="995" y2="1464" class="flow"/>
  <line x1="995" y1="1464" x2="600" y2="1464" class="flow"/>

  <line x1="600" y1="1410" x2="600" y2="1464" class="flow"/>
  <rect x="430" y="1464" width="340" height="72" rx="18" ry="18" class="action"/>
  <text x="600" y="1508" text-anchor="middle" class="body">Enter Role-Sensitive Workspace</text>

  <circle cx="600" cy="1560" r="22" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <circle cx="600" cy="1560" r="12" fill="#111827"/>
</svg>
