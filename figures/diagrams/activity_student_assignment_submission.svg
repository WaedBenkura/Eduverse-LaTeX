<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1420" viewBox="0 0 1200 1420">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#374151"/>
    </marker>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .body { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .small { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .action { fill: #f8fafc; stroke: #1f2937; stroke-width: 2.2; }
      .decision { fill: #ffffff; stroke: #1f2937; stroke-width: 2.2; }
      .flow { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="1420" fill="#ffffff"/>
  <text x="600" y="54" text-anchor="middle" class="title">Activity Diagram: Student Assignment Submission</text>

  <circle cx="600" cy="96" r="18" fill="#111827"/>
  <line x1="600" y1="114" x2="600" y2="158" class="flow"/>

  <rect x="420" y="158" width="360" height="76" rx="18" ry="18" class="action"/>
  <text x="600" y="202" text-anchor="middle" class="body">Open Class and Select Assignment</text>

  <line x1="600" y1="234" x2="600" y2="286" class="flow"/>
  <rect x="405" y="286" width="390" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="324" text-anchor="middle" class="body">System Checks Assignment Visibility,</text>
  <text x="600" y="348" text-anchor="middle" class="body">Deadline, and Submission Rules</text>

  <line x1="600" y1="368" x2="600" y2="422" class="flow"/>
  <polygon points="600,422 720,507 600,592 480,507" class="decision"/>
  <text x="600" y="501" text-anchor="middle" class="body">Submission</text>
  <text x="600" y="526" text-anchor="middle" class="body">open?</text>

  <line x1="480" y1="507" x2="275" y2="507" class="flow"/>
  <rect x="90" y="467" width="185" height="82" rx="18" ry="18" class="action"/>
  <text x="182" y="505" text-anchor="middle" class="small">Show Closed or</text>
  <text x="182" y="529" text-anchor="middle" class="small">Unavailable State</text>

  <line x1="600" y1="592" x2="600" y2="650" class="flow"/>
  <rect x="395" y="650" width="410" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="688" text-anchor="middle" class="body">Review Instructions and Prepare</text>
  <text x="600" y="712" text-anchor="middle" class="body">Text or File-Based Response</text>

  <line x1="600" y1="732" x2="600" y2="784" class="flow"/>
  <rect x="410" y="784" width="380" height="76" rx="18" ry="18" class="action"/>
  <text x="600" y="828" text-anchor="middle" class="body">Upload or Enter Submission Content</text>

  <line x1="600" y1="860" x2="600" y2="914" class="flow"/>
  <rect x="405" y="914" width="390" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="952" text-anchor="middle" class="body">System Validates Submission Format,</text>
  <text x="600" y="976" text-anchor="middle" class="body">Ownership, and Remaining Attempt</text>

  <line x1="600" y1="996" x2="600" y2="1050" class="flow"/>
  <polygon points="600,1050 720,1135 600,1220 480,1135" class="decision"/>
  <text x="600" y="1129" text-anchor="middle" class="body">Submission</text>
  <text x="600" y="1154" text-anchor="middle" class="body">valid?</text>

  <line x1="480" y1="1135" x2="275" y2="1135" class="flow"/>
  <rect x="90" y="1095" width="185" height="82" rx="18" ry="18" class="action"/>
  <text x="182" y="1133" text-anchor="middle" class="small">Request Correction</text>
  <text x="182" y="1157" text-anchor="middle" class="small">and Resubmission</text>
  <line x1="182" y1="1095" x2="182" y2="822" class="flow"/>
  <line x1="182" y1="822" x2="410" y2="822" class="flow"/>

  <line x1="600" y1="1220" x2="600" y2="1276" class="flow"/>
  <rect x="415" y="1276" width="370" height="76" rx="18" ry="18" class="action"/>
  <text x="600" y="1320" text-anchor="middle" class="body">Store Submission and Timestamp</text>

  <line x1="600" y1="1352" x2="600" y2="1400" class="flow"/>
  <circle cx="600" cy="1400" r="22" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <circle cx="600" cy="1400" r="12" fill="#111827"/>
</svg>
