<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1340" viewBox="0 0 1200 1340">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#374151"/>
    </marker>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .body { font: 500 20px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .small { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .action { fill: #f8fafc; stroke: #1f2937; stroke-width: 2.2; }
      .decision { fill: #ffffff; stroke: #1f2937; stroke-width: 2.2; }
      .flow { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="1340" fill="#ffffff"/>
  <text x="600" y="54" text-anchor="middle" class="title">Activity Diagram: Integrated IDE Usage</text>

  <circle cx="600" cy="96" r="18" fill="#111827"/>
  <line x1="600" y1="114" x2="600" y2="158" class="flow"/>

  <rect x="420" y="158" width="360" height="76" rx="18" ry="18" class="action"/>
  <text x="600" y="202" text-anchor="middle" class="body">Open Programming Class Activity</text>

  <line x1="600" y1="234" x2="600" y2="286" class="flow"/>
  <rect x="390" y="286" width="420" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="324" text-anchor="middle" class="body">System Loads IDE Workspace, Files,</text>
  <text x="600" y="348" text-anchor="middle" class="body">and Class-Specific Programming Context</text>

  <line x1="600" y1="368" x2="600" y2="422" class="flow"/>
  <rect x="430" y="422" width="340" height="76" rx="18" ry="18" class="action"/>
  <text x="600" y="466" text-anchor="middle" class="body">Write or Modify Source Code</text>

  <line x1="600" y1="498" x2="600" y2="550" class="flow"/>
  <rect x="435" y="550" width="330" height="76" rx="18" ry="18" class="action"/>
  <text x="600" y="594" text-anchor="middle" class="body">Run or Compile the Solution</text>

  <line x1="600" y1="626" x2="600" y2="680" class="flow"/>
  <rect x="405" y="680" width="390" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="718" text-anchor="middle" class="body">Review Output, Errors, or Execution</text>
  <text x="600" y="742" text-anchor="middle" class="body">Feedback from the Environment</text>

  <line x1="600" y1="762" x2="600" y2="816" class="flow"/>
  <polygon points="600,816 720,901 600,986 480,901" class="decision"/>
  <text x="600" y="895" text-anchor="middle" class="body">Solution or code</text>
  <text x="600" y="920" text-anchor="middle" class="body">ready?</text>

  <line x1="480" y1="901" x2="350" y2="901" class="flow"/>
  <line x1="350" y1="901" x2="350" y2="460" class="flow"/>
  <line x1="350" y1="460" x2="430" y2="460" class="flow"/>
  <text x="324" y="684" text-anchor="middle" class="small">revise</text>

  <line x1="600" y1="986" x2="600" y2="1044" class="flow"/>
  <rect x="390" y="1044" width="420" height="82" rx="18" ry="18" class="action"/>
  <text x="600" y="1082" text-anchor="middle" class="body">Save Progress or Submit Programming</text>
  <text x="600" y="1106" text-anchor="middle" class="body">Work to the Related Course Activity</text>

  <line x1="600" y1="1126" x2="600" y2="1174" class="flow"/>
  <circle cx="600" cy="1174" r="22" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <circle cx="600" cy="1174" r="12" fill="#111827"/>
</svg>
